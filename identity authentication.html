<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background-color: #fff;
  }

  /* Header */
  .header {
    background: linear-gradient(180deg, #08001a 0%, #1b0c2c 100%);
    color: #fff;
    text-align: center;
    padding: 15px 0;
    position: relative;
  }

  .header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 500;
  }

  .back-arrow {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 26px;
    color: #fff;
    text-decoration: none;
  }

  /* Content box */
  .content {
    background: #fff;
    padding: 10px 20px;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    border-bottom: 1px solid #f1f1f1;
  }

  .label {
    color: #444;
    font-size: 17px;
    font-weight: 500;
  }

  input[type="text"], select {
    border: none;
    outline: none;
    font-size: 14px;
    color: #555;
    text-align: right;
    width: 60%;
  }

  input::placeholder {
    color: #b0b0b0;
  }

  /* Gender Section */
  .gender {
    display: flex;
    align-items: center;
    gap: 25px;
  }

  .gender label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 15px;
    color: #666;
  }

  .gender input[type="radio"] {
    display: none;
  }

  .gender .circle {
    width: 20px;
    height: 20px;
    border: 2px solid #ccc;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .gender input[type="radio"]:checked + .circle {
    border: 5px solid #ffa200;
  }

  /* Divider */
  .divider {
    height: 10px;
    background: linear-gradient(180deg, #ececec, #d9d9d9);
    border: none;
    margin: 0 -20px;
  }

  /* Submit button */
  .submit-btn {
    display: block;
    width: 90%;
    margin: 25px auto;
    background: linear-gradient(180deg, #08001a 0%, #1b0c2c 100%);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  .submit-btn:hover {
    opacity: 0.85;
  }

  /* Popup */
  .popup {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff4b4b;
    color: white;
    padding: 12px 25px;
    border-radius: 8px;
    font-size: 15px;
    opacity: 0;
    animation: fadeInOut 2s ease-in-out;
    z-index: 1000;
  }

  @keyframes fadeInOut {
    0% {opacity: 0; transform: translate(-50%, -20px);}
    20%,80% {opacity: 1; transform: translate(-50%, 0);}
    100% {opacity: 0; transform: translate(-50%, -20px);}
  }

</style>
</head>

   <!-- Error Popup -->
  <div id="errorPopup" class="popup" style="display: none;">
    <span>❌</span> Please fill in all fields!
  </div>
  
  <script>
    function showErrorPopup(message) {
      const popup = document.getElementById('errorPopup');
      popup.innerHTML = `<span>❌</span> ${message}`;
      popup.style.display = "flex";
      setTimeout(() => {
        popup.style.display = "none";
      }, 3000);
    }

    function submitForm() {
      const name = document.getElementById("name");
      const gender = document.querySelector('input[name="gender"]:checked');
      const nationality = document.getElementById("nationality");
      const address = document.getElementById("address");

      if (!name.value.trim() || !gender || !nationality.value || !address.value.trim()) {
        showErrorPopup('Please fill in all fields!');
        return;
      }

      // Disable all inputs after submission
      name.disabled = true;
      nationality.disabled = true;
      address.disabled = true;
      document.querySelectorAll('input[name="gender"]').forEach(el => el.disabled = true);

      document.querySelector(".submit-btn").disabled = true;
      document.querySelector(".submit-btn").innerText = "Submitted";
    }
  </script>
