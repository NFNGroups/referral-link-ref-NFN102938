 <script>
function showMsg(text, success=false){    
  let msg = document.createElement("div");    
  msg.className = "msg " + (success ? "success" : "error");    
  msg.innerHTML = `<span>${success ? "✅" : "❌"}</span> ${text}`;    
  document.body.appendChild(msg);    
  setTimeout(()=>msg.remove(), 3000);    
}    

function highlightInput(input, isError, isSuccess=false){    
  input.classList.remove("input-error","input-success");    
  if(isError) input.classList.add("input-error");    
  else if(isSuccess) input.classList.add("input-success");    
}    

function generateCaptchaCode() {    
  const code = Math.floor(1000 + Math.random() * 9000);    
  document.getElementById("captchaCode").textContent = code;    
  document.getElementById("actualCaptcha").value = code;    
}

const rememberCheck = document.getElementById('rememberCheck');    
let remember = false;  
  
window.onload = function () {
  generateCaptchaCode();

  const savedEmail = localStorage.getItem("rememberedEmail");
  const savedPassword = localStorage.getItem("rememberedPassword");
  const savedCheckbox = localStorage.getItem("rememberCheckbox");

  if (savedEmail && savedPassword && savedCheckbox === "true") {
    document.getElementById("loginEmail").value = savedEmail;
    document.getElementById("loginPassword").value = savedPassword;
    rememberCheck.classList.add("active");
    remember = true;
  } else {
    remember = false;
  }
};

const firebaseConfig = {

    firebase.auth().onAuthStateChanged((user) => {

});
    
document.getElementById("registerForm").addEventListener("submit", function(e){    
  e.preventDefault();    
  const email = document.getElementById("emailInput");    
  const password = document.getElementById("passwordInput");    
  const confirmPassword = document.getElementById("confirmPasswordInput");    
  const captchaInput = document.getElementById("userCaptchaInput");    
  const actualCaptcha = document.getElementById("actualCaptcha").value;    

  highlightInput(email,false); highlightInput(password,false); highlightInput(confirmPassword,false); highlightInput(captchaInput,false);    

  if(password.value.length < 8){ highlightInput(password,true); showMsg("Password must be at least 8 characters"); return; }    
  if(password.value !== confirmPassword.value){ highlightInput(password,true); highlightInput(confirmPassword,true); showMsg("Passwords do not match"); return; }    
  if(captchaInput.value !== actualCaptcha){ highlightInput(captchaInput,true); showMsg("Incorrect verification code"); generateCaptchaCode(); return; }    

  auth.createUserWithEmailAndPassword(email.value, password.value)    
    .then((userCredential) => {    
      const user = userCredential.user;    
      user.sendEmailVerification().then(()=>{    
        showMsg("Registration successful! Verification email sent.", true);    
      }).catch((err)=>{    
        showMsg("Error sending verification: " + err.message);    
      });    
    // Create referral code from email name + random numbers
const emailName = email.value.split("@")[0]; // josephblessing123
const shortName = emailName.replace(/[^a-zA-Z]/g, "").substring(0, 6) || "User";
const referralCode = shortName.toUpperCase() + Math.floor(1000 + Math.random() * 9000);
// Example: JOSEPH4821  

db.collection("users").doc(user.uid).set({      
  email: email.value,      
  createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  referralCode: referralCode, // Unique code for this user
  referredBy: localStorage.getItem("referredBy") || null // Track who referred this user
});
      const referredBy = localStorage.getItem("referredBy");

if (referredBy) {
  // Add this user UID to the referrer's document
  db.collection("users").where("referralCode", "==", referredBy).get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        db.collection("users").doc(doc.id).update({
          referrals: firebase.firestore.FieldValue.arrayUnion(user.uid)
        });
      });
    });

  // Remove referral from local storage
  localStorage.removeItem("referredBy");
}
      highlightInput(email,false,true); highlightInput(password,false,true); highlightInput(confirmPassword,false,true);    
    })    
    .catch((error) => {    
      if(error.code === "auth/email-already-in-use"){ highlightInput(email,true); showMsg("This email is already registered. Try login."); }

 rememberMe.addEventListener('click', () => {

 fingerprintBtn.addEventListener("click", async () => {
    if (loginEmail.value.trim() === "") {
        showMsg("Enter email first");
        return;
    }

    const savedFingerprintPassword = localStorage.getItem("fingerprintPassword");

    if (!savedFingerprintPassword) {
        showMsg("Please login once with password first");
        return;
    }

    try {
        await navigator.credentials.create({
            publicKey: {
                challenge: new Uint8Array(32),
                rp: { name: "NFN Login" },
                user: {
                    id: new Uint8Array(16),
                    name: loginEmail.value,
                    displayName: loginEmail.value
                },
                pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                authenticatorSelection: {
                    authenticatorAttachment: "platform",
                    userVerification: "required"
                },
                timeout: 60000
            }
        });

        // ✅ Firebase login with saved password
        auth.signInWithEmailAndPassword(loginEmail.value, savedFingerprintPassword)
        .then(() => {
            showMsg("Login successful via fingerprint!", true);
            document.getElementById("loader").style.display = "flex";
            setTimeout(() => {
                window.location.href = "my project.html";
            }, 3000);
        })
        .catch((error) => {
            if(error.code === "auth/wrong-password") showMsg("Wrong password for this email");
            else if(error.code === "auth/user-not-found") showMsg("Email not registered");
            else showMsg("Login failed via fingerprint");
        });

    } catch (err) {
        showMsg("Fingerprint cancelled");
    }
});
  // Normal login form submission
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();

    const email = loginEmail.value.trim();
    const password = loginPassword.value.trim();
    const referredBy = localStorage.getItem('referredBy');

localStorage.setItem('userProfile', JSON.stringify({
  email: email,
  referralCode: localStorage.getItem('referralCode'),
  referredBy: referredBy || null,
  createdAt: new Date().toISOString()
}));
  
    if(email === "" || password === ""){
        showMsg("Email and password required");
        return;
    }

    auth.signInWithEmailAndPassword(email, password)
.then((userCredential) => {

    const user = userCredential.user;

    // ❌ BLOCK LOGIN IF EMAIL IS NOT VERIFIED
    if (!user.emailVerified) {
        showMsg("❌ Please verify your email before logging in");
        auth.signOut();
        return;
    }
      
      localStorage.removeItem("referredBy");
      
        // Save password for fingerprint login
        localStorage.setItem("fingerprintPassword", password);
        localStorage.setItem("registeredEmail", email);

        // Remember me
        if(remember){
            localStorage.setItem("rememberedEmail", email);
            localStorage.setItem("rememberedPassword", password);
            localStorage.setItem("rememberCheckbox", "true");
        }

        showMsg("Login successful!", true);
        document.getElementById("loader").style.display = "flex";
        setTimeout(() => {
            window.location.href = "my project.html";
        }, 3000);
    })
    .catch((error) => {
        if(error.code === "auth/wrong-password") showMsg("Wrong password");
        else if(error.code === "auth/user-not-found") showMsg("Email not registered");
        else showMsg("Login failed");
    });
});
</script>
