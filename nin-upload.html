<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIN Verification</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto}
body{margin:0;background:#f4f6fa}

.app{
  max-width:420px;
  margin:auto;
  min-height:100vh;
  background:#fff;
}

/* Header */
.header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  border-bottom:1px solid #eee;
}
.back{font-size:18px;cursor:pointer}
.header h3{margin:0;font-size:17px}

/* Card */
.card{
  margin:20px;
  padding:18px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}
.card h4{margin:0 0 6px}
.card p{
  margin:0 0 16px;
  font-size:13px;
  color:#666;
}

/* Upload box */
.upload{
  border:2px dashed #2dbd6e;
  border-radius:14px;
  padding:22px 15px;
  text-align:center;
  cursor:pointer;
  background:#f6fffa;
  margin-bottom:15px;
}
.upload.done{
  border-color:#1e8e5a;
  background:#e9f9f0;
}
.upload i{
  font-size:32px;
  color:#2dbd6e;
  margin-bottom:8px;
}
.upload span{
  display:block;
  font-weight:600;
  color:#2dbd6e;
}

/* Preview */
.preview{
  display:none;
  margin-top:10px;
}
.preview img{
  width:100%;
  border-radius:12px;
}
.filename{
  font-size:13px;
  margin-top:6px;
  text-align:center;
}

/* Button */
.footer{
  padding:15px;
}
button{
  width:100%;
  padding:14px;
  background:#2dbd6e;
  border:none;
  border-radius:12px;
  font-size:15px;
  color:#fff;
  font-weight:600;
}
button:disabled{
  background:#ccc;
}

/* hide input */
input[type=file]{display:none}
</style>
</head>

<body>

<div class="app">

 <!-- Header -->
<div class="header">
  <i class="fa-solid fa-chevron-left back" id="levelBack"></i>
  <h3>NIN Verification</h3>
</div>

  <!-- Card -->
  <div class="card">
    <h4>Upload National ID (NIN)</h4>
    <p>Please upload clear photos of the <b>front</b> and <b>back</b> of your NIN slip or card.</p>

    <!-- FRONT -->
    <label class="upload" id="frontBox">
      <i class="fa fa-id-card"></i>
      <span>Upload NIN Front</span>
      <input type="file" accept="image/*" id="frontInput">
    </label>
    <div class="preview" id="frontPreview">
      <img id="frontImg">
      <div class="filename" id="frontName"></div>
    </div>

    <!-- BACK -->
    <label class="upload" id="backBox">
      <i class="fa fa-id-card"></i>
      <span>Upload NIN Back</span>
      <input type="file" accept="image/*" id="backInput">
    </label>
    <div class="preview" id="backPreview">
      <img id="backImg">
      <div class="filename" id="backName"></div>
    </div>

  </div>

  <!-- Button -->
  <div class="footer">
    <button id="submitBtn" disabled>Submit NIN Verification</button>
  </div>

</div>

<script>
const frontInput = document.getElementById('frontInput');
const backInput = document.getElementById('backInput');
const submitBtn = document.getElementById('submitBtn');

let frontDone = false;
let backDone = false;

frontInput.onchange = ()=>{
  const file = frontInput.files[0];
  if(!file) return;
  document.getElementById('frontImg').src = URL.createObjectURL(file);
  document.getElementById('frontName').textContent = file.name;
  document.getElementById('frontPreview').style.display = "block";
  document.getElementById('frontBox').classList.add("done");
  frontDone = true;
  checkReady();
};

backInput.onchange = ()=>{
  const file = backInput.files[0];
  if(!file) return;
  document.getElementById('backImg').src = URL.createObjectURL(file);
  document.getElementById('backName').textContent = file.name;
  document.getElementById('backPreview').style.display = "block";
  document.getElementById('backBox').classList.add("done");
  backDone = true;
  checkReady();
};

function checkReady(){
  submitBtn.disabled = !(frontDone && backDone);
}

submitBtn.onclick = ()=>{
  alert("NIN uploaded successfully ✔\nVerification in progress.");
};
  document.getElementById('levelBack').onclick = () => {
  history.back();
};
</script>
</body>
</html>
